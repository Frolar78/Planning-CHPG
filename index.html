<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning — CHPG Monaco · Anesthésie-Réanimation</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">MC</div>
    <div>
      <div class="header-title">Planning médical</div>
      <div class="header-sub">CHPG Monaco · Service d'Anesthésie-Réanimation</div>
    </div>
  </div>
  <span class="header-badge" id="headerBadge">Chargement…</span>
</header>

<nav class="toolbar">
  <div class="month-tabs" id="monthTabs"></div>
  <div class="toolbar-right">
    <div class="view-toggle">
      <button id="btnDoctors" class="active">Médecins</button>
      <button id="btnSectors">Secteurs</button>
    </div>
    <input class="search-box" id="searchInput" type="search" placeholder="Rechercher…" />
    <button class="btn" id="btnToday">Aujourd'hui</button>
  </div>
</nav>

<section class="kpis" id="kpis"></section>

<main class="panel">
  <div class="panel-head">
    <div>
      <div class="panel-title" id="panelTitle">Planning</div>
      <div class="panel-hint">
        <b>AM</b> = matin &nbsp;·&nbsp; <b>PM</b> = après-midi &nbsp;·&nbsp;
        🔴 garde &nbsp;·&nbsp; 🟡 8h–18h &nbsp;·&nbsp;
        RG = repos garde &nbsp;·&nbsp; CP = congés &nbsp;·&nbsp; A = absence &nbsp;·&nbsp; F = formation
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div class="table-wrap">
    <table id="planningTable"></table>
  </div>
</main>

<script src="./data.js"></script>
<script src="./rules.js"></script>
<script src="./app.js"></script>
</body>
</html>
