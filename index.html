<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — CHPG Monaco · Anesthésie-Réanimation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="./style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-flag">
      <div class="flag-top"></div>
      <div class="flag-bottom"></div>
    </div>
    <div class="header-text">
      <div class="header-title">Planning Anesthésistes</div>
      <div class="header-sub">CHPG Monaco · Service d'Anesthésie-Réanimation</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-today" id="btnToday">Aujourd'hui</button>
  </div>
</header>

<!-- WEEK NAV -->
<nav class="week-nav">
  <span class="nav-label">Mois</span>
  <select class="month-select" id="monthSelect"></select>
  <div class="nav-divider"></div>
  <div class="week-pills" id="weekPills"></div>
  <button class="export-btn" id="exportBtn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
    </svg>
    Exporter Excel
  </button>
</nav>

<!-- LEGEND -->
<div class="legend-row">
  <div class="legend-group">
    <div class="legend-item"><div class="legend-dot guard"></div> Garde 24h</div>
    <div class="legend-item"><div class="legend-dot h18"></div> 8h–18h</div>
    <div class="legend-item"><div class="legend-dot absent"></div> Absent / Congé / Formation</div>
  </div>
  <div class="legend-group" style="color:#94A3B8;font-size:11px">
    AM = matin · PM = après-midi
  </div>
</div>

<!-- TABLE -->
<div class="table-container">
  <table class="planning-table" id="planningTable"></table>
</div>

<!-- BOTTOM -->
<div id="bottomSection"></div>

<script src="./data.js"></script>
<script src="./rules.js"></script>
<script src="./app.js"></script>
</body>
</html>
