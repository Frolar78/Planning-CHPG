<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — CHPG Monaco · Anesthésie-Réanimation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="./style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  
  <!-- CHAT -->
<button class="chat-btn" id="chatBtn" title="Assistant Planning">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-title">
      <div class="chat-header-dot"></div>
      Assistant Planning CHPG
    </div>
    <button class="chat-close" id="chatClose">✕</button>
  </div>

  <!-- Auth -->
  <div class="chat-auth-screen" id="chatAuthScreen">
    <div class="chat-auth-title">Accès réservé au comité</div>
    <div class="chat-auth-sub">Saisissez le code administrateur</div>
    <input class="chat-auth-input" id="chatAuthInput" type="password"
      placeholder="Code admin" autocomplete="off"/>
    <button class="chat-auth-btn" id="chatAuthBtn">Accéder →</button>
    <div class="chat-auth-error" id="chatAuthError">Code invalide.</div>
  </div>

  <!-- Main -->
  <div class="chat-main-screen" id="chatMainScreen">
    <div class="chat-modif-summary" id="chatModifSummary"></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-typing" id="chatTyping">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput"
        placeholder="Décrivez la modification souhaitée..." rows="1"></textarea>
      <button class="chat-send" id="chatSend">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="./chat.js"></script>
  
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-flag">
      <div class="flag-top"></div>
      <div class="flag-bottom"></div>
    </div>
    <div class="header-text">
      <div class="header-title">Planning Anesthésistes</div>
      <div class="header-sub">CHPG Monaco · Service d'Anesthésie-Réanimation</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-today" id="btnToday">Aujourd'hui</button>
    <a href="./comite.html" style="font-size:12px;font-weight:600;color:var(--ink-3);text-decoration:none;padding:6px 12px;border:1.5px solid var(--line);border-radius:8px;transition:all .15s" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--ink-3)'">Comité →</a>
  </div>
</header>

<!-- WEEK NAV -->
<div class="view-toggle-main">
  <button id="btnPlanning" class="view-main-btn active">Planning</button>
  <button id="btnMedecins" class="view-main-btn">Médecins</button>
</div>
<nav class="week-nav">
  <span class="nav-label">Mois</span>
  <select class="month-select" id="monthSelect"></select>
  <div class="nav-divider"></div>
  <div class="week-pills" id="weekPills"></div>
  <button class="export-btn" id="exportBtn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
    </svg>
    Exporter Excel
  </button>
</nav>

<!-- LEGEND -->
<div class="legend-row">
  <div class="legend-group">
    <div class="legend-item"><div class="legend-dot guard"></div> Garde 24h</div>
    <div class="legend-item"><div class="legend-dot h18"></div> 8h–18h</div>
    <div class="legend-item"><div class="legend-dot absent"></div> Absent / Congé / Formation</div>
  </div>
  <div class="legend-group" style="color:#94A3B8;font-size:11px">
    AM = matin · PM = après-midi
  </div>
</div>

<!-- TABLE -->
<div id="planningView">
  <div class="table-container">
    <table class="planning-table" id="planningTable"></table>
  </div>
  <div id="bottomSection"></div>
</div>
<div id="medecinsView" style="display:none">
  <div class="table-container">
    <table class="planning-table" id="bilanMensuel"></table>
  </div>
  <div class="table-container" style="margin-top:0">
    <table class="planning-table" id="bilanAnnuel"></table>
  </div>
</div>

<script src="./data.js"></script>
<script src="./rules.js"></script>
<script src="./app.js"></script>
</body>
</html>
