<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning médical — CHPG Monaco</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">CHPG Monaco</p>
        <h1>Planning médical</h1>
        <p class="subtitle">Service d’Anesthésie-Réanimation</p>
      </div>
      <div class="hero-card">
        <span id="monthLabel">Chargement…</span>
        <strong id="doctorCount">—</strong>
        <small>médecins affichés</small>
      </div>
    </header>

    <section class="toolbar">
      <div class="segmented" id="monthTabs"></div>
      <div class="tools">
        <input id="searchInput" type="search" placeholder="Rechercher un médecin…" />
        <button id="todayBtn">Mois actuel</button>
      </div>
    </section>

    <section class="kpis" id="kpis"></section>

    <main class="panel">
      <div class="panel-head">
        <div>
          <h2 id="tableTitle">Planning</h2>
          <p id="tableHint">G = garde 24h · 18 = journée 8h–18h · RG = repos de garde</p>
        </div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="table-wrap">
        <table id="planningTable"></table>
      </div>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
